name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      # The only thing in CI that draws an instrument. The unit suite covers the decoders, the
      # store's failure paths and the archive's arithmetic, and none of it renders a pixel.
      # ubuntu-latest ships Chrome at /usr/bin/google-chrome, which the script already probes for.
      - name: Visual check
        run: |
          # Redirected, or the backgrounded server holds the step's stdout open and the job hangs
          # after the check has already passed.
          npm run preview -- --port 4173 > preview.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -sf http://localhost:4173/jk-bms-victron-dashboard/ > /dev/null && break
            sleep 1
          done
          npm run check:visual || { cat preview.log; exit 1; }

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v5
